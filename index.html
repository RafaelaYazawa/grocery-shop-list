<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Grocery List</title>
    </head>

    <body class="m-2 p-8 bg-gray-900 text-gray-100 md:max-w-3xl md:mx-auto">
        <h1 class="text-3xl font-semibold">Grocery List</h1>

        <div class="m-4 space-y-4 space-x-2 md:max-w-sm">
            <div class="mb-2">
                <div class="mb-0 space-x-1 max-w-3xl mx-auto">
                    <label for="product-name" class="font-medium italic">Product:</label>
                    <input type="text" id="product-name" name="product" class="w-full bg-gray-700 px-2 rounded"
                        placeholder="Milk">
                </div>
                <span class="m-0 name-error text-xs text-red-500"></span>
            </div>

            <div class="mb-2">
                <div class="mb-0 space-x-1 max-w-3xl mx-auto">
                    <label for="quantity" class="font-medium italic">Quantity:</label>
                    <input type="number" name="quantity" id="quantity" class="w-full bg-gray-700 px-2 rounded"
                        placeholder="2">
                </div>
                <span class="m-0 quantity-error text-xs text-red-500"></span>
            </div>

            <div class="mb-2">
                <div class="mb-0 space-x-1 max-w-3xl mx-auto">
                    <label for="price" class="font-medium italic">Price(¥):</label>
                    <input type="number" name="price" id="price" class="w-full  bg-gray-700 px-2 rounded"
                        placeholder="130">
                </div>
                <span class="m-0 price-error text-xs text-red-500"></span>
            </div>
        </div>

        <button type="button" class="btn mt-2 mb-3 mx-3 border border-solid border-green-700 p-2 rounded bg-green-900">
            Add item
        </button>

        <button type="button"
            class="reset-table mt-2 mb-3 px-3 border border-solid border-red-700 p-2 rounded bg-red-900">
            Reset list
        </button>

        <div class="my-4 mx-3">
            <table class="table-fixed w-full border-spacing-2 rounded w-full bg-gray-700 text-center">
                <thead class="border-b bg-slate-700 ">
                    <tr>
                        <th class="p-2">Product</th>
                        <th class="p-2">Quantity</th>
                        <th class="p-2">Price</th>
                    </tr>
                </thead>

                <tbody class="product-overview">
                    <!-- Added items will appear here -->
                </tbody>

            </table>

        </div>

        <div class="total-price fixed bottom-0 left-0 right-0 bg-gray-200 ">
            <h3 class="p-3 text-2xl text-green-700 font-medium italic">
                Total Price:
                <span class="total-price-value">¥0</span>
            </h3>

        </div>

    </body>

    <script src="main.js"></script>

</html>
